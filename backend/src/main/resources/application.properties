# ===============================
# DATABASE (Supabase PostgreSQL)
# ===============================
spring.datasource.url=${MYSQL_URL}
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ===============================
# SERVER PORT
# ===============================
server.port=${PORT:8080}

# ===============================
# EMAIL (TEMP FIX for local)
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=dummy@gmail.com
spring.mail.password=dummy
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ===============================
# FARE CONFIGURATION
# ===============================
fare.bike.base=30
fare.bike.rate=8

fare.auto.base=40
fare.auto.rate=10

fare.car.base=50
fare.car.rate=12

fare.surge.enabled=true
fare.surge.multiplier=1.5

fare.minimum=60

fare.night.enabled=true
fare.night.percentage=20
fare.night.start=22
fare.night.end=5

fare.waiting.enabled=true
fare.waiting.freeMinutes=5
fare.waiting.perMinute=2

# ===============================
# PAYMENT (TEMP FIX)
# ===============================
razorpay.key.id=dummy
razorpay.key.secret=dummy

# ===============================
# GOOGLE MAPS (FIXED)
# ===============================
google.maps.api.key=dummy_key

# ===============================
# TWILIO (TEMP FIX)
# ===============================
twilio.account.sid=dummy
twilio.auth.token=dummy
twilio.phone.number=dummy